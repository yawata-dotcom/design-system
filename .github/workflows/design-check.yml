name: design-check
# 共通デザインの正本リポ自身もチェック（tokens.css 定義は除外、その他にうっかり直書きが無いか）。
on:
  push:
  pull_request:

jobs:
  colors:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - name: 色チェック（公式17色のみ）
        run: sh tools/check-colors.sh .
      - name: アイコンチェック（Material のみ・RULEBOOK §6）
        run: sh tools/check-icons.sh .
      - name: アイコン色チェック（fill:currentColor を継ぐ・MaterialIcon禁止・RULEBOOK §6）
        run: sh tools/check-icon-color.sh .
      - name: フォントチェック（共通フォントのみ・細く見せる設定禁止）
        run: sh tools/check-font.sh .
      - name: ヘッダーチェック（正典5点＝最終同期/期間/会社/役割セレクタ/ヘルプ・shell-demo.html）
        run: sh tools/check-header.sh shell-demo.html
      - name: 重なりチェック（他の開いているPRと同じファイルを触っていないか）
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sh tools/check-overlap.sh ${{ github.event.pull_request.number }}

  # 実測アイコン色番人（正本の自己検査）：正典 shell-demo.html を実測し
  # 「選択中=青／ヘッダー=グレー」を担保（各製品が写して使うテンプレ）。
  runtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Playwright 導入（chromium のみ）
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright >/dev/null 2>&1
          npx playwright install --with-deps chromium
      - name: 実測アイコン色チェック（正典 shell-demo.html）
        run: node tools/check-icon-color-runtime.mjs "file://$PWD/shell-demo.html"
